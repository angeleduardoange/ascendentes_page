<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE INTELIGENCIA - ASCENDENTES</title>
    <style>
        body {
            background-color: #050505;
            color: #1aff1a;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        #terminal {
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 1px solid #1aff1a;
            box-shadow: 0 0 20px rgba(26, 255, 26, 0.2);
            border-radius: 5px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #1aff1a;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
        a { color: yellow; text-decoration: none; border: 1px solid yellow; padding: 5px; margin-top: 20px; display: inline-block; }
        a:hover { background: yellow; color: black; }
        .warning { color: red; font-weight: bold; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="terminal">
    <div class="warning">⚠️ ADVERTENCIA: ACCESO RESTRINGIDO - GOBIERNO DE VENEZUELA ⚠️</div>
    <div id="output"></div>
    <span class="cursor"></span>
    <br>
    <a href="https://instagram.com/ascendentesband" target="_blank">> ACCEDER AL INSTAGRAM</a>
</div>

<script>
    const output = document.getElementById('output');
    const lines = [
        "> Inicializando protocolo de rastreo...",
        "> Conectando con satélite Simón Bolívar...",
        "> Localizando banda: ASCENDENTES.",
        "> Analizando perfiles criminales...",
        "> [ABRAHAM]: Localizado. Estatus: TRUE. Olor detectado: Lácteos.",
        "> [SANTIAGO]: Error. Localización probable: Islamabad.",
        "> [VÍCTOR]: Señal débil. Posible sobredosis rítmica.",
        "> [JEREMÍAS]: Sujeto detectado en zona de arbustos (1.50m).",
        "> [ESTHEFANY]: Buscando... [ARCHIVOS ELIMINADOS POR SEGURIDAD].",
        "> ADVERTENCIA: El 3 de enero de 2026 se acerca.",
        "> Los Prowlers han ascendido. El caos es inminente."
    ];

    let lineIndex = 0;
    let charIndex = 0;

    function type() {
        if (lineIndex < lines.length) {
            if (charIndex < lines[lineIndex].length) {
                output.innerHTML += lines[lineIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, 30);
            } else {
                output.innerHTML += "<br>";
                charIndex = 0;
                lineIndex++;
                setTimeout(type, 500);
            }
        }
    }
    type();
</script>

</body>
</html>
